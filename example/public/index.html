<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wicketkeeper Demo Form</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css"
    />
    <script defer src="http://localhost:8080/fast.js"></script>
  </head>
  <body>
    <h1>Sign up</h1>
    <form action="http://localhost:8081/submit" method="POST">
      <div>
        <label>
          Name:
          <input type="text" name="name" required />
        </label>
      </div>
      <div>
        <label>
          Email:
          <input type="email" name="email" required />
        </label>
      </div>
      <div class="wicketkeeper" data-input-name="wicketkeeper_response"></div>
      <br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
