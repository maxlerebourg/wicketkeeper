name: Generate release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          cd /tmp
          wget https://github.com/orhun/git-cliff/releases/download/v2.9.1/git-cliff-2.9.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xvzf git-cliff-2.9.1-x86_64-unknown-linux-gnu.tar.gz
          mv git-cliff-2.9.1/git-cliff /usr/local/bin

      - name: Generate changelog for the current tag
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git-cliff --current \
                    --config=cliff.toml \
                    --output /tmp/NOTES.md \
                    --verbose

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          check-latest: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install npm dependencies and run script
        run: |
          cd client
          npm install
          npm run build:fast
          npm run build:slow
          mv dist/ ../server/static

      - name: Install go dependencies
        run: |
          cd server
          go mod vendor

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GH_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
